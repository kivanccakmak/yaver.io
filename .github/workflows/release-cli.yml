name: Release CLI

on:
  push:
    tags:
      - "cli/v*"

# Only repo owner can push tags (configure tag protection rules in GitHub).
# Release/deploy jobs require the "production" environment (configure required reviewers in GitHub).

concurrency:
  group: release-cli
  cancel-in-progress: false

permissions:
  contents: write

env:
  GO_VERSION: "1.22"

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Extract and validate version
        id: version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/cli/v}"
          JSON_VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('versions.json','utf8')).cli)")
          if [ "$TAG_VERSION" != "$JSON_VERSION" ]; then
            echo "ERROR: Tag version ($TAG_VERSION) does not match versions.json ($JSON_VERSION)"
            exit 1
          fi
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $TAG_VERSION"

  build:
    needs: validate
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            runner: macos-latest
          - goos: darwin
            goarch: amd64
            runner: macos-latest
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
          - goos: windows
            goarch: amd64
            runner: ubuntu-latest
    runs-on: ${{ matrix.runner }}
    env:
      VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          cd desktop/agent
          BINARY_NAME="yaver-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY_NAME="${BINARY_NAME}.exe"
          fi
          go build -ldflags="-s -w" -o "$BINARY_NAME" .
          echo "Built: $BINARY_NAME"

      - name: Package tar.gz (Linux/macOS)
        if: matrix.goos != 'windows'
        run: |
          cd desktop/agent
          BINARY="yaver-${{ matrix.goos }}-${{ matrix.goarch }}"
          cp "$BINARY" yaver
          tar czf "yaver-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" yaver
          rm yaver

      - name: Package zip (Windows)
        if: matrix.goos == 'windows'
        run: |
          cd desktop/agent
          zip "yaver-windows-${{ matrix.goarch }}.zip" "yaver-windows-${{ matrix.goarch }}.exe"

      - name: Create DMG (macOS)
        if: matrix.goos == 'darwin'
        run: |
          cd desktop/agent
          BINARY="yaver-${{ matrix.goos }}-${{ matrix.goarch }}"
          ARCH_LABEL="${{ matrix.goarch }}"
          if [ "$ARCH_LABEL" = "arm64" ]; then ARCH_LABEL="apple-silicon"; fi
          if [ "$ARCH_LABEL" = "amd64" ]; then ARCH_LABEL="intel"; fi
          DMG_NAME="Yaver-${VERSION}-${ARCH_LABEL}.dmg"

          # Create .app bundle
          APP_DIR="/tmp/Yaver.app"
          rm -rf "$APP_DIR"
          mkdir -p "$APP_DIR/Contents/MacOS"
          mkdir -p "$APP_DIR/Contents/Resources"
          cp "$BINARY" "$APP_DIR/Contents/MacOS/yaver"
          chmod +x "$APP_DIR/Contents/MacOS/yaver"

          cat > "$APP_DIR/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>Yaver</string>
            <key>CFBundleDisplayName</key><string>Yaver CLI</string>
            <key>CFBundleIdentifier</key><string>io.yaver.cli</string>
            <key>CFBundleVersion</key><string>${VERSION}</string>
            <key>CFBundleShortVersionString</key><string>${VERSION}</string>
            <key>CFBundleExecutable</key><string>yaver</string>
            <key>CFBundlePackageType</key><string>APPL</string>
          </dict>
          </plist>
          PLIST

          # Create DMG
          DMG_DIR="/tmp/dmg-staging"
          rm -rf "$DMG_DIR"
          mkdir -p "$DMG_DIR"
          cp -R "$APP_DIR" "$DMG_DIR/"
          ln -s /Applications "$DMG_DIR/Applications"

          hdiutil create -volname "Yaver $VERSION" \
            -srcfolder "$DMG_DIR" \
            -ov -format UDZO \
            "$DMG_NAME"

          echo "Created: $DMG_NAME"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            desktop/agent/yaver-*.tar.gz
            desktop/agent/yaver-*.zip
            desktop/agent/yaver-*.exe
            desktop/agent/Yaver-*.dmg
          retention-days: 7

  release:
    needs: [validate, build]
    runs-on: ubuntu-latest
    environment: production
    env:
      VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: cli-*

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.exe" -o -name "*.dmg" \) -exec cp {} release/ \;
          cd release
          sha256sum * > checksums.txt
          echo "Release files:"
          ls -la

      - name: Create draft GitHub release
        env:
          GH_TOKEN: ${{ secrets.YAVER_CLI_REPO_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ secrets.YAVER_CLI_REPO || github.repository }}"
          gh release create "v${VERSION}" \
            --repo "$REPO" \
            --title "Yaver CLI v${VERSION}" \
            --draft \
            --generate-notes \
            release/*

          echo "Draft release created: v${VERSION}"
          echo "Windows EXE is unsigned — sign with SimplySign before publishing."

  update-package-managers:
    needs: [validate, release]
    runs-on: ubuntu-latest
    environment: production
    if: false  # Enable after first successful release
    env:
      VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - name: Update Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.YAVER_CLI_REPO_TOKEN }}
        run: |
          # TODO: Compute SHA256 from release artifacts and PR to homebrew-yaver tap
          echo "Homebrew tap update: not yet implemented"

      - name: Update Scoop manifest
        env:
          GH_TOKEN: ${{ secrets.YAVER_CLI_REPO_TOKEN }}
        run: |
          # TODO: Compute SHA256 from release artifacts and PR to scoop-yaver
          echo "Scoop manifest update: not yet implemented"
